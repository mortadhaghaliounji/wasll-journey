<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasll Political Journey</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <aside id="sidebar">
        <div class="top-bar">
            <h1 class="logo-title">Wasll <span>Journey</span></h1>
        </div>
        <div id="countries-container"></div>
        
        <!-- Barre d'actions combinant l'import et l'exportation -->
        <div class="sidebar-actions">
            <label for="import-file" class="action-btn import-btn">📁 Importer</label>
            <input type="file" id="import-file" accept="image/*" style="display: none;">
            <button id="download-btn" class="action-btn download-btn">💾 Exporter</button>
        </div>

        <div id="logos-container"></div>
    </aside>

    <main id="workspace">
        <div id="canvas-paper">
            <div id="staircase-container" class="staircase-wrapper"></div>
            <div id="empty-hint">CLIQUEZ SUR UN LOGO<br>POUR COMMENCER</div>
            <div id="watermark">Mon Parcours Politique</div>
        </div>
    </main>

    <!-- Importation de html2canvas depuis un CDN fiable -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
